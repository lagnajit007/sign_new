[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn --workers 2 --bind 0.0.0.0:$PORT --timeout 120 --log-level info app2:app"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
PORT = "5000"
FRONTEND_ORIGIN = "https://sanjog.vercel.app"
RATELIMIT_PER_MINUTE = "60"
