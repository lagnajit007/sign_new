[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.args]
BUILD_VERSION = "v2"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
FRONTEND_ORIGIN = "https://signnew-production.up.railway.app,http://localhost:3000"
RATELIMIT_PER_MINUTE = "60"
