[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[build.args]
RAILWAY_GIT_COMMIT_SHA = "${{RAILWAY_GIT_COMMIT_SHA}}"
RAILWAY_DEPLOYMENT_ID = "${{RAILWAY_DEPLOYMENT_ID}}"
RAILWAY_SNAPSHOT_ID = "${{RAILWAY_SNAPSHOT_ID}}"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
FRONTEND_ORIGIN = "https://signnew-production.up.railway.app,http://localhost:3000"
RATELIMIT_PER_MINUTE = "60"
